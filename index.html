<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2342" />
  <title>MYC Weekly Message Generator</title>
  <style>
    :root {
      --sea: #0a2342; --sea-mid: #1a4a7a; --sea-light: #2a7ab8;
      --sail: #e8f4fd; --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
      --card-bg: #0f2e50; --card-border: #1e4976; --text: #e8f4fd; --muted: #7bafd4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #060f1e 0%, #0a2342 60%, #0d3060 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
    }
    header {
      text-align: center; padding: 1.5rem 1rem 1rem;
      border-bottom: 1px solid var(--card-border);
      background: rgba(6,15,30,0.7); position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(8px);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; }
    main { max-width: 720px; margin: 0 auto; padding: 1rem; }

    .event-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; margin-bottom: 1.25rem; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .event-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
      padding: 0.9rem 1rem 0.7rem;
      background: rgba(26,74,122,0.3); border-bottom: 1px solid var(--card-border);
    }
    .event-title { font-size: 1.05rem; font-weight: 700; }
    .event-date  { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
    .event-body  { padding: 0.75rem 1rem; }

    .duty-row {
      display: flex; gap: 0.5rem; align-items: baseline;
      font-size: 0.82rem; margin-bottom: 0.3rem;
    }
    .duty-label { color: var(--muted); min-width: 160px; flex-shrink: 0; }
    .duty-value { color: var(--sail); }
    .duty-value.missing { color: var(--amber); font-style: italic; }

    .weather-block {
      margin-top: 0.6rem; padding-top: 0.6rem;
      border-top: 1px solid var(--card-border);
      display: flex; flex-wrap: wrap; gap: 0.6rem;
    }
    .wx-chip {
      font-size: 0.75rem; padding: 0.2rem 0.55rem; border-radius: 8px;
      background: rgba(42,122,184,0.2); border: 1px solid rgba(42,122,184,0.3);
      color: #93c5fd;
    }
    .wx-chip.tide { color: #60a5fa; border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.12); }
    .wx-chip.wind { color: #93c5fd; }
    .wx-chip.warn { color: var(--amber); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.12); }
    .wx-chip.bad  { color: var(--red);   border-color: rgba(239,68,68,0.4);  background: rgba(239,68,68,0.1);  }

    /* Message preview */
    .message-section { margin-top: 1.5rem; }
    .message-section h2 { font-size: 1rem; margin-bottom: 0.6rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .message-box {
      background: #111d2e; border: 1px solid var(--card-border);
      border-radius: 12px; padding: 1rem;
      font-family: 'Courier New', monospace; font-size: 0.82rem;
      line-height: 1.6; white-space: pre-wrap; color: var(--sail);
    }
    .copy-btn {
      display: block; width: 100%; margin-top: 0.6rem;
      padding: 0.6rem; border-radius: 10px;
      background: rgba(42,122,184,0.3); border: 1px solid var(--sea-light);
      color: var(--sail); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .copy-btn:hover { background: rgba(42,122,184,0.5); }
    .copy-btn.copied { background: rgba(34,197,94,0.25); border-color: var(--green); color: var(--green); }

    .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 1rem;
      border: 3px solid var(--card-border); border-top-color: var(--sea-light);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 1rem; color: var(--red); margin-bottom: 1rem;
    }
    footer { text-align: center; color: var(--muted); font-size: 0.65rem; padding: 1.5rem 1rem 2.5rem; }
    footer a { color: var(--muted); }

    .refresh-bar {
      display: flex; justify-content: flex-end; padding: 0.5rem 0 0.25rem;
    }
    .refresh-btn {
      font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 8px;
      background: transparent; border: 1px solid var(--card-border);
      color: var(--muted); cursor: pointer;
    }
    .refresh-btn:hover { border-color: var(--sea-light); color: var(--sail); }
  </style>
</head>
<body>

<header>
  <h1>⛵ MYC Weekly Message</h1>
  <p>Margate Yacht Club · Auto-generated weekly update</p>
  <p id="data-age" style="color:var(--amber);font-size:0.7rem;margin-top:0.2rem"></p>
</header>

<main>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading events, tides &amp; weather…</p>
  </div>
  <div id="error" style="display:none"></div>
  <div id="events-container" style="display:none">
    <div class="refresh-bar">
      <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
    </div>
    <div id="event-cards"></div>
    <div class="message-section">
      <h2>📋 Generated Message</h2>
      <div class="message-box" id="message-preview"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyMessage()">📋 Copy to Clipboard</button>
    </div>
  </div>
</main>

<footer>

</footer>

// ─── TIMEZONE HELPERS (BST/UTC) ───────────────────────────────────────────────
function lastSundayOf(year, month0) {
  const d = new Date(Date.UTC(year, month0 + 1, 0));
  d.setUTCDate(d.getUTCDate() - d.getUTCDay());
  d.setUTCHours(1, 0, 0, 0);
  return d.getTime();
}
function isBST(ts) {
  const y = new Date(ts).getUTCFullYear();
  return ts >= lastSundayOf(y, 2) && ts < lastSundayOf(y, 9);
}
function fmtLocal(ts) {
  const off = isBST(ts) ? 3600000 : 0;
  const d = new Date(ts + off);
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}
function tzLabel(ts) { return isBST(ts) ? 'BST' : 'UTC'; }

// ─── TIDE ENGINE ──────────────────────────────────────────────────────────────
const TIDES = RAW_TIDES.map(([date, time, height, type]) => {
  const [y,mo,dy] = date.split('-').map(Number);
  const [h,m] = time.split(':').map(Number);
  return { ts: Date.UTC(y, mo-1, dy, h, m), height, type };
}).sort((a,b) => a.ts - b.ts);

function tidesForDate(ds) {
  return TIDES.filter(t => {
    const d = new Date(t.ts);
    const k = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    return k === ds;
  });
}

function tideLabel(ds) {
  // Returns e.g. "HW 09:04" or "LW 16:08" for the most relevant tide during event time
  const allTides = tidesForDate(ds);
  if (!allTides.length) return null;
  // Pick the tide closest to 10:30 (typical event start) or 18:30 (evening)
  const eventHour = ds.includes('2026') ? 10 : 10; // can be refined
  const eventTs = Date.UTC(...ds.split('-').map(Number).map((v,i)=>i===1?v-1:v), eventHour, 30);
  let closest = allTides[0];
  allTides.forEach(t => {
    if (Math.abs(t.ts - eventTs) < Math.abs(closest.ts - eventTs)) closest = t;
  });
  return `${closest.type === 'H' ? 'HW' : 'LW'} ${fmtLocal(closest.ts)}`;
}

// ─── WEATHER ─────────────────────────────────────────────────────────────────
const LAT = 51.3904, LON = 1.3791;
let weatherCache = null;

// ─── WEATHER THRESHOLDS (tweak these) ────────────────────────────────────────
const WEATHER_THRESHOLDS = {
  // Wind emoji rules
  // Green: F2–F3 (unless gust escalates)
  // Amber: sustained F4+ OR (F3 gusting F4+)
  // Red: gusting F6+
  wind: {
    red_gust_bft: 6,
    amber_sustained_bft: 4,
    amber_when_sustained_bft: 3,
    amber_gust_bft: 4,
  },

  // Condition warnings
  rain_mmh: { amber: 1, red: 3 },
  gust_mph: { amber: 24, red: 30 },
  wave_m: { amber: 1.0, red: 1.5 },
  fog_proxy: { cloud_pct: 95, wind_mph_lte: 6 },
  stormy_proxy: { cloud_pct: 90, rain_mmh_gte: 1, gust_mph_gte: 24 },
};

async function fetchWeather() {
  if (weatherCache) return weatherCache;
  const base   = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`;
  const marine = `https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}`;
  const [atmoRes, marRes] = await Promise.all([
    fetch(base   + `&hourly=wind_speed_10m,wind_gusts_10m,wind_direction_10m,precipitation,cloud_cover&wind_speed_unit=mph&forecast_days=10&timezone=UTC`),
    fetch(marine + `&hourly=wave_height&forecast_days=10&timezone=UTC`)
  ]);
  const atmo = await atmoRes.json();
  let waveMap = {};
  if (marRes.ok) {
    const mar = await marRes.json();
    mar.hourly.time.forEach((t,i) => { waveMap[t] = mar.hourly.wave_height[i]; });
  }
  const map = {};
  atmo.hourly.time.forEach((t,i) => {
    map[t] = {
      wind:  atmo.hourly.wind_speed_10m[i],
      gust:  atmo.hourly.wind_gusts_10m[i],
      dir:   atmo.hourly.wind_direction_10m[i],
      rain:  atmo.hourly.precipitation[i],
      cloud: atmo.hourly.cloud_cover[i],
      wave:  waveMap[t] ?? null,
    };
  });
  weatherCache = map;
  return map;
}

function wxAt(map, isoDate, hour) {
  const k = `${isoDate}T${String(hour).padStart(2,'0')}:00`;
  return map?.[k] ?? null;
}

function dirLabel(deg) {
  if (deg == null) return '';
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

function windDesc(mph, dir) {
  const d = dirLabel(dir);
  return `${d ? d + ' ' : ''}${Math.round(mph)}mph`;
}

function beaufortFromMph(mph) {
  // Approximate Beaufort number from mph.
  // https://en.wikipedia.org/wiki/Beaufort_scale (rounded thresholds)
  if (mph == null || Number.isNaN(mph)) return null;
  const v = Number(mph);
  if (v < 1) return 0;
  if (v < 4) return 1;
  if (v < 8) return 2;
  if (v < 13) return 3;
  if (v < 19) return 4;
  if (v < 25) return 5;
  if (v < 32) return 6;
  if (v < 39) return 7;
  if (v < 47) return 8;
  if (v < 55) return 9;
  if (v < 64) return 10;
  if (v < 73) return 11;
  return 12;
}

function windRiskEmoji(wx) {
  // Rules requested:
  // - F2-3 green
  // - F3 gusting F4 amber
  // - gusting 6 red
  // Interpreting: base wind (sustained) uses Beaufort; gust uses Beaufort.
  const bf = beaufortFromMph(wx?.wind);
  const g  = beaufortFromMph(wx?.gust);
  if (bf == null) return '';

  // Red if gust reaches configured Bft
  if (g != null && g >= WEATHER_THRESHOLDS.wind.red_gust_bft) return '🔴';

  // Amber if sustained >= 4 OR (sustained is 3 and gust >= 4)
  if (bf >= WEATHER_THRESHOLDS.wind.amber_sustained_bft) return '🟠';
  if (
    bf === WEATHER_THRESHOLDS.wind.amber_when_sustained_bft &&
    g != null &&
    g >= WEATHER_THRESHOLDS.wind.amber_gust_bft
  ) return '🟠';

  // Green for F2-3 (and calmer)
  return '🟢';
}

function conditionWarnings(wx) {
  // Heuristics only (Open-Meteo free endpoints don't provide thunder probability here)
  // Use rain/cloud/wave as proxies for “rain/squall/fog” style warnings.
  const warns = [];
  if (!wx) return warns;

  const rain = Number(wx.rain ?? 0);
  const cloud = Number(wx.cloud ?? 0);
  const wave = wx.wave == null ? null : Number(wx.wave);
  const gust = Number(wx.gust ?? 0);

  // Rain warning
  if (rain >= WEATHER_THRESHOLDS.rain_mmh.red) warns.push({ level: 'red', label: 'Heavy rain', emoji: '🌧️' });
  else if (rain >= WEATHER_THRESHOLDS.rain_mmh.amber) warns.push({ level: 'amber', label: 'Showers', emoji: '🌦️' });

  // Squall/gustiness warning
  if (gust >= WEATHER_THRESHOLDS.gust_mph.red) warns.push({ level: 'red', label: 'Squally gusts', emoji: '💥' });
  else if (gust >= WEATHER_THRESHOLDS.gust_mph.amber) warns.push({ level: 'amber', label: 'Gusty', emoji: '🌬️' });

  // Fog proxy: very high cloud + low wind can indicate poor vis (rough heuristic)
  if (cloud >= WEATHER_THRESHOLDS.fog_proxy.cloud_pct && (wx.wind ?? 0) <= WEATHER_THRESHOLDS.fog_proxy.wind_mph_lte) {
    warns.push({ level: 'amber', label: 'Possible fog/low vis', emoji: '🌫️' });
  }

  // Waves warning (if marine endpoint returned waves)
  if (wave != null) {
    if (wave >= WEATHER_THRESHOLDS.wave_m.red) warns.push({ level: 'red', label: `${wave.toFixed(1)}m waves`, emoji: '🌊' });
    else if (wave >= WEATHER_THRESHOLDS.wave_m.amber) warns.push({ level: 'amber', label: `${wave.toFixed(1)}m waves`, emoji: '🌊' });
  }

  // Thunder isn't available here; flag “stormy” when rain+gusty+very cloudy
  if (
    cloud >= WEATHER_THRESHOLDS.stormy_proxy.cloud_pct &&
    rain >= WEATHER_THRESHOLDS.stormy_proxy.rain_mmh_gte &&
    gust >= WEATHER_THRESHOLDS.stormy_proxy.gust_mph_gte
  ) {
    warns.push({ level: 'amber', label: 'Stormy conditions', emoji: '⛈️' });
  }

  return warns;
}

function worstLevel(warns) {
  const order = { red: 2, amber: 1, green: 0 };
  let best = 'green';
  for (const w of (warns ?? [])) {
    if ((order[w.level] ?? 0) > (order[best] ?? 0)) best = w.level;
  }
  return best;
}

function levelEmoji(level) {
  if (level === 'red') return '🔴';
  if (level === 'amber') return '🟠';
  return '🟢';
}

// ─── MESSAGE FORMATTER ────────────────────────────────────────────────────────
function formatDate(isoDate) {
  const d = new Date(isoDate + 'T12:00:00Z');
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'UTC' });
}

function titleCase(s) {
  if (!s) return '';
  return String(s)
    .split(' ')
    .map(w => w ? (w[0].toUpperCase() + w.slice(1)) : w)
    .join(' ');
}

function formatDutyAssignments(dutiesObj) {
  // `dutiesObj` shape (new): { "Race Box": [{name, role, status, member_url}, ...], ... }
  // (legacy): { safety_boat: "..." }
  if (!dutiesObj || typeof dutiesObj !== 'object') return [];

  // Legacy format detection: if value is a string, show as-is.
  const legacyKeys = Object.keys(dutiesObj);
  if (legacyKeys.some(k => typeof dutiesObj[k] === 'string')) {
    const rows = [];
    for (const [k, v] of Object.entries(dutiesObj)) {
      if (typeof v === 'string' && v.trim()) rows.push([titleCase(String(k).replaceAll('_', ' ')), v.trim()]);
    }
    return rows;
  }

  const rows = [];
  for (const [dutyName, assignments] of Object.entries(dutiesObj)) {
    if (!Array.isArray(assignments) || !assignments.length) continue;

    // Sort to keep stable output: confirmed, pending, needed, unassigned, unknown; then role
    const rank = { confirmed: 0, pending: 1, needed: 2, unassigned: 3, unknown: 4 };
    const list = [...assignments].sort((a, b) => {
      const ra = rank[a?.status] ?? 9;
      const rb = rank[b?.status] ?? 9;
      if (ra !== rb) return ra - rb;
      const ar = (a?.role ?? '').toString();
      const br = (b?.role ?? '').toString();
      return ar.localeCompare(br);
    });

    const parts = list.map(a => {
      const role = a?.role ? `${a.role}: ` : '';
      // WhatsApp readability: show “Volunteer needed” but omit “(needed)” suffixes
      const name = a?.name
        ? a.name
        : (a?.status === 'needed' ? 'Volunteer needed' : a?.status === 'unassigned' ? '—' : 'TBC');
      return `${role}${name}`.trim();
    });

    rows.push([dutyName, parts.join(' · ')]);
  }
  return rows;
}

function compactDutiesForMessage(dutyRows) {
  // Tidy WhatsApp layout:
  // - keep “Race Box” on its own line
  // - combine PB helm + PB crew on one line
  const norm = (s) => String(s ?? '').trim().toLowerCase();
  const get = (label) => {
    const hit = dutyRows.find(([l]) => norm(l) === norm(label));
    return hit ? hit[1] : null;
  };

  const raceBox = get('Race Box');
  const pbHelm = get('Power Boat Helm (PB2)') ?? get('Power Boat Helm');
  const pbCrew = get('Power Boat Crew');

  const used = new Set([
    norm('Race Box'),
    norm('Power Boat Helm (PB2)'),
    norm('Power Boat Helm'),
    norm('Power Boat Crew'),
  ]);

  const out = [];
  if (raceBox) out.push(['Race Box', raceBox]);

  if (pbHelm || pbCrew) {
    const bits = [];
    if (pbHelm) bits.push(`Power Boat Helm (PB2): ${pbHelm}`);
    if (pbCrew) bits.push(`Power Boat Crew: ${pbCrew}`);
    out.push(['', bits.join(' · ')]);
  }

  // Preserve other duties on their own lines
  for (const [label, value] of dutyRows) {
    if (used.has(norm(label))) continue;
    out.push([label, value]);
  }

  return out;
}

function buildMessage(events) {
  if (!events.length) return '(No upcoming events found.)';

  // Group events by week (Wed–Tue is the MYC posting window)
  const lines = [];
  lines.push('🌊📣 Ahoy there shipmates!');
  lines.push('Radio MYC here with your weekly update of events taking place on our local beloved waters!');
  lines.push('');

  for (const ev of events) {
    const d = ev.duties || {};
    const wx = ev._wx;
    const tide = ev._tide;
    const warns = conditionWarnings(wx);
    const windEmoji = windRiskEmoji(wx);

    lines.push(`*${formatDate(ev.date)}*`);
    lines.push(`*${ev.title}*`);

    // Duties (roster-derived)
    const dutyRows = formatDutyAssignments(d);
    const msgDutyRows = compactDutiesForMessage(dutyRows);
    if (msgDutyRows.length) {
      lines.push('');
      for (const [label, value] of msgDutyRows) {
        if (!label) lines.push(value);
        else lines.push(`${label}: ${value}`);
      }
    }

    lines.push('');
    if (tide) lines.push(`🌊 ${tide}`);
    if (wx) {
      const bf = beaufortFromMph(wx.wind);
      const bg = beaufortFromMph(wx.gust);
      const bits = [];
      bits.push(`${windEmoji} 💨 ${dirLabel(wx.dir)} ${Math.round(wx.wind)}mph`);
      if (wx.gust != null) bits.push(`G${Math.round(wx.gust)}mph`);
      if (bf != null) bits.push(`F${bf}${bg != null ? `G${bg}` : ''}`);
      lines.push(bits.join(' '));

      // Concise warnings line
      if (warns.length) {
        const lvl = worstLevel(warns);
        const top = warns
          .slice(0, 3)
          .map(w => `${w.emoji} ${w.label}`)
          .join(' · ');
        lines.push(`${levelEmoji(lvl)} Warnings: ${top}`);
      }
    }

    lines.push('');
  }

  return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
}

// ─── CARD RENDERER ────────────────────────────────────────────────────────────
function renderEventCard(ev) {
  const d = ev.duties || {};
  const wx = ev._wx;
  const tide = ev._tide;
  const warns = conditionWarnings(wx);

  const dutyRows = formatDutyAssignments(d);

   const dutyHTML = dutyRows.map(([label, value]) => `
     <div class="duty-row">
       <span class="duty-label">${label}:</span>
       <span class="duty-value">${value}</span>
     </div>`).join('') || `<div class="duty-row"><span class="duty-value missing">⚠︎ No duties scraped yet — check MYC website</span></div>`;

  let wxHTML = '';
  if (wx || tide) {
    const chips = [];
    if (tide) chips.push(`<span class="wx-chip tide">🌊 ${tide}</span>`);
    if (wx) {
      const speed = Math.round(wx.wind);
      const dir = dirLabel(wx.dir);
      const cls = speed > 25 ? 'bad' : speed > 18 ? 'warn' : 'wind';
      const windEmoji = windRiskEmoji(wx);
      const bf = beaufortFromMph(wx.wind);
      const bg = beaufortFromMph(wx.gust);
      const gustTxt = wx.gust != null ? ` g${Math.round(wx.gust)}mph` : '';
      const bfTxt = bf != null ? ` F${bf}${bg != null ? `g${bg}` : ''}` : '';
      chips.push(`<span class="wx-chip ${cls}">${windEmoji} 💨 ${dir} ${speed}mph${gustTxt}${bfTxt}</span>`);

      // Add warning chips
      for (const w of warns.slice(0, 3)) {
        const wcls = w.level === 'red' ? 'bad' : w.level === 'amber' ? 'warn' : '';
        chips.push(`<span class="wx-chip ${wcls}">${w.emoji} ${w.label}</span>`);
      }

       if (wx.wave != null) {
         const wcls = wx.wave > 1.5 ? 'bad' : wx.wave > 1.0 ? 'warn' : '';
         chips.push(`<span class="wx-chip ${wcls}">🌊 ${wx.wave.toFixed(1)}m waves</span>`);
       }
     }
     wxHTML = `<div class="weather-block">${chips.join('')}</div>`;
   }

  return `
  <div class="event-card">
    <div class="event-header">
      <div>
        <div class="event-title">${ev.title}</div>
        <div class="event-date">${formatDate(ev.date)}</div>
      </div>
    </div>
    <div class="event-body">
      ${dutyHTML}
      ${wxHTML}
    </div>
  </div>`;
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
function copyMessage() {
  const text = document.getElementById('message-preview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy to Clipboard'; btn.classList.remove('copied'); }, 2500);
  });
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
async function main() {
  const loadEl   = document.getElementById('loading');
  const errorEl  = document.getElementById('error');
  const container = document.getElementById('events-container');

  try {
    // Load events JSON (committed by GitHub Actions)
    const eventsResp = await fetch('./data/events.json');
    if (!eventsResp.ok) throw new Error(`Could not load data/events.json (${eventsResp.status})`);
    const eventsData = await eventsResp.json();

    // Show data age warning if stale
    const genAt = new Date(eventsData.generated_at);
    const ageHours = (Date.now() - genAt) / 3600000;
    if (ageHours > 72) {
      document.getElementById('data-age').textContent =
        `⚠ Data last updated ${Math.round(ageHours/24)} days ago`;
    }

    // Fetch weather once
    let wx = null;
    try { wx = await fetchWeather(); } catch(e) { console.warn('Weather unavailable', e); }

    // Filter to events from today onwards, max 14 days
    const today = new Date().toISOString().slice(0,10);
    const cutoff = new Date(Date.now() + 14*86400000).toISOString().slice(0,10);
    const events = (eventsData.events || []).filter(ev => ev.date >= today && ev.date <= cutoff);

    // Attach weather and tide data to each event
    for (const ev of events) {
      // Determine event hour (evening = 18, daytime = 10)
      const isEvening = /halfmoon|evening|wednesday/i.test(ev.title);
      const eventHour = isEvening ? 18 : 10;
      ev._wx   = wxAt(wx, ev.date, eventHour);
      ev._tide = tideLabel(ev.date);
    }

    // Render cards
    const cardsEl = document.getElementById('event-cards');
    if (!events.length) {
      cardsEl.innerHTML = `<p style="color:var(--muted);text-align:center;padding:2rem">No upcoming events found for the next 14 days.</p>`;
    } else {
      cardsEl.innerHTML = events.map(renderEventCard).join('');
    }

    // Generate message
    document.getElementById('message-preview').textContent = buildMessage(events);

    loadEl.style.display = 'none';
    container.style.display = 'block';

  } catch (err) {
    loadEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.innerHTML = `<div class="error-box">
      <strong>Error loading events:</strong> ${err.message}<br>
      <small>Has the GitHub Actions workflow run yet? Check the Actions tab.</small>
    </div>`;
    container.style.display = 'block';
    document.getElementById('event-cards').innerHTML = '';
    document.getElementById('message-preview').textContent = '';
  }
}

main();
</script>
