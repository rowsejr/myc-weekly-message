name: Update MYC Events

on:
  schedule:
    - cron: '15 5 * * *'   # Daily at 05:15 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape MYC events & duties
        env:
          MYC_USERNAME: ${{ secrets.MYC_USERNAME }}
          MYC_PASSWORD: ${{ secrets.MYC_PASSWORD }}
        run: python scraper/scrape_myc.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/duties.json
          git diff --cached --quiet || git commit -m "chore: update events data [skip ci]"
          git push