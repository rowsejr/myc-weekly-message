name: Update MYC Events

on:
  schedule:
    - cron: '0 6 * * 3'   # Every Wednesday at 06:00 UTC (before the weekly message goes out)
  workflow_dispatch:        # Allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit data/events.json back to repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape MYC events
        env:
          MYC_USERNAME: ${{ secrets.MYC_USERNAME }}
          MYC_PASSWORD: ${{ secrets.MYC_PASSWORD }}
        run: python scraper/scrape_myc.py

      - name: Commit updated events data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "chore: update events data [skip ci]"
          git push